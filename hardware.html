<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background-color: #555;
            padding: 10px;
        }

        nav button {
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            background-color: #ff9800;
            color: white;
            border-radius: 5px;
            font-size: 14px;
        }

        nav button:hover {
            background-color: #e68900;
        }

        .container {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th {
            background-color: #333;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #333;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>My Website</h1>
</header>

<nav>
    <button onclick="alert('Login clicked!')">Login</button>
    <button onclick="alert('About Us clicked!')">About Us</button>
</nav>

<div class="container">
    <h2>Sample Table</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>City</th>
        </tr>
        <tr>
            <td>1</td>
            <td>John</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Alice</td>
            <td>London</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Rahul</td>
            <td>Delhi</td>
        </tr>
    </table>
</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
